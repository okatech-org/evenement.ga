steps:
  # ── 1. Build Docker image ─────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "--build-arg",
        "NEXT_PUBLIC_CONVEX_URL=${_CONVEX_URL}",
        "-t",
        "gcr.io/$PROJECT_ID/eventflow:latest",
        ".",
      ]

  # ── 2. Push to Container Registry ─────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/eventflow:latest"]

  # ── 3. Extract static assets for Firebase Hosting CDN ─────
  # Sert _next/static/* directement depuis Firebase CDN
  # pour eviter l'erreur MIME text/html via Cloud Run.
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        id=$$(docker create gcr.io/$PROJECT_ID/eventflow:latest)
        mkdir -p public_html/_next
        docker cp $$id:/app/.next/static public_html/_next/static
        docker cp $$id:/app/public/. public_html/
        docker rm $$id

  # ── 4. Deploy static files to Firebase Hosting ────────────
  - name: "node:20-alpine"
    entrypoint: "npx"
    args:
      - "-y"
      - "firebase-tools@latest"
      - "deploy"
      - "--only"
      - "hosting"
      - "--project"
      - "$PROJECT_ID"

  # ── 5. Run Prisma database migrations ─────────────────────
  - name: "gcr.io/$PROJECT_ID/eventflow:latest"
    entrypoint: "npx"
    args: ["prisma", "migrate", "deploy"]
    env:
      - "DATABASE_URL=${_DATABASE_URL}"

  # ── 6. Deploy to Cloud Run ────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "eventflow"
      - "--image"
      - "gcr.io/$PROJECT_ID/eventflow:latest"
      - "--region"
      - "europe-west1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--memory"
      - "512Mi"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "3"
      - "--set-env-vars"
      - "DATABASE_URL=${_DATABASE_URL},AUTH_SECRET=${_NEXTAUTH_SECRET},NEXTAUTH_SECRET=${_NEXTAUTH_SECRET},AUTH_URL=${_NEXTAUTH_URL},NEXTAUTH_URL=${_NEXTAUTH_URL},AUTH_TRUST_HOST=true,NEXT_PUBLIC_CONVEX_URL=${_CONVEX_URL},RESEND_API_KEY=${_RESEND_API_KEY},GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID},GOOGLE_CLIENT_SECRET=${_GOOGLE_CLIENT_SECRET},APPLE_CLIENT_ID=${_APPLE_CLIENT_ID},APPLE_CLIENT_SECRET=${_APPLE_CLIENT_SECRET},APPLE_TEAM_ID=${_APPLE_TEAM_ID},APPLE_KEY_ID=${_APPLE_KEY_ID}"

substitutions:
  _DATABASE_URL: ""
  _CONVEX_URL: "https://laudable-tortoise-21.eu-west-1.convex.cloud"
  _NEXTAUTH_SECRET: "2Oi9lWVtY8HyJLtLSz1zwa+bOp20GiCH96ASwaLPAJ8="
  _NEXTAUTH_URL: "https://evenements.pro"
  _GOOGLE_CLIENT_ID: ""
  _GOOGLE_CLIENT_SECRET: ""
  _APPLE_CLIENT_ID: ""
  _APPLE_CLIENT_SECRET: ""
  _APPLE_TEAM_ID: ""
  _APPLE_KEY_ID: ""
  _RESEND_API_KEY: ""

images:
  - "gcr.io/$PROJECT_ID/eventflow:latest"

options:
  logging: CLOUD_LOGGING_ONLY
