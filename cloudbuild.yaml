steps:
  # ── 1. Build Docker image ─────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "--build-arg",
        "NEXT_PUBLIC_CONVEX_URL=${_CONVEX_URL}",
        "-t",
        "gcr.io/$PROJECT_ID/eventflow:latest",
        ".",
      ]

  # ── 2. Push to Container Registry ─────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/eventflow:latest"]

  # ── 3. Run Prisma database migrations ─────────────────────
  # Utilise node:20-alpine (root) avec npm ci pour avoir prisma + prisma/config.
  # L'image runtime ne contient pas les devDependencies Prisma.
  - name: "node:20-alpine"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        if [ -z "$$DATABASE_URL" ]; then
          echo "WARN: DATABASE_URL empty, skipping migrations"
          exit 0
        fi
        npm ci --ignore-scripts --no-audit --no-fund 2>&1 | tail -5
        npx prisma migrate deploy --schema prisma/schema.prisma
    env:
      - "DATABASE_URL=${_DATABASE_URL}"

  # ── 4. Deploy to Cloud Run (CRITICAL) ─────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "eventflow"
      - "--image"
      - "gcr.io/$PROJECT_ID/eventflow:latest"
      - "--region"
      - "europe-west1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--memory"
      - "512Mi"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "3"
      - "--set-env-vars"
      - "DATABASE_URL=${_DATABASE_URL},AUTH_SECRET=${_NEXTAUTH_SECRET},NEXTAUTH_SECRET=${_NEXTAUTH_SECRET},AUTH_URL=${_NEXTAUTH_URL},NEXTAUTH_URL=${_NEXTAUTH_URL},AUTH_TRUST_HOST=true,NEXT_PUBLIC_CONVEX_URL=${_CONVEX_URL},RESEND_API_KEY=${_RESEND_API_KEY},GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID},GOOGLE_CLIENT_SECRET=${_GOOGLE_CLIENT_SECRET},APPLE_CLIENT_ID=${_APPLE_CLIENT_ID},APPLE_CLIENT_SECRET=${_APPLE_CLIENT_SECRET},APPLE_TEAM_ID=${_APPLE_TEAM_ID},APPLE_KEY_ID=${_APPLE_KEY_ID}"

  # ── 5. Extract static assets for Firebase Hosting CDN ─────
  # Copie _next/static/* depuis le container Docker pour que
  # Firebase Hosting serve les assets statiques directement.
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        id=$$(docker create gcr.io/$PROJECT_ID/eventflow:latest)
        mkdir -p public_html/_next
        docker cp $$id:/app/.next/static public_html/_next/static
        docker cp $$id:/app/public/. public_html/
        docker rm $$id

  # ── 6. Deploy static files to Firebase Hosting ────────────
  # Necessite le role roles/firebasehosting.admin sur le SA Cloud Build.
  # Si ce step echoue, Cloud Run (step 4) sert deja tout correctement.
  - name: "node:20-alpine"
    entrypoint: "sh"
    args:
      - "-c"
      - "npx -y firebase-tools@latest deploy --only hosting --project $PROJECT_ID || echo 'WARN: Firebase Hosting deploy skipped (missing permissions or config)'"

substitutions:
  _DATABASE_URL: ""
  _CONVEX_URL: "https://laudable-tortoise-21.eu-west-1.convex.cloud"
  _NEXTAUTH_SECRET: "2Oi9lWVtY8HyJLtLSz1zwa+bOp20GiCH96ASwaLPAJ8="
  _NEXTAUTH_URL: "https://evenements.pro"
  _GOOGLE_CLIENT_ID: ""
  _GOOGLE_CLIENT_SECRET: ""
  _APPLE_CLIENT_ID: ""
  _APPLE_CLIENT_SECRET: ""
  _APPLE_TEAM_ID: ""
  _APPLE_KEY_ID: ""
  _RESEND_API_KEY: ""

images:
  - "gcr.io/$PROJECT_ID/eventflow:latest"

options:
  logging: CLOUD_LOGGING_ONLY
